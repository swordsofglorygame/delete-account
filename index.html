<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد حذف الحساب</title>
  <style>
    body { margin: 0; background: #121212; color: #fff; font-family: Tahoma, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; direction: rtl; }
    .card { width: 90%; max-width: 420px; background: #1f1f1f; padding: 40px 20px; border-radius: 12px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,.5); }
    h2 { margin-top: 0; color: #ffcc00; font-size: 24px; }
    p { line-height: 1.8; margin-bottom: 30px; color: #ccc; font-size: 15px; }
    button { background: #c62828; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; width: 100%; max-width: 250px; }
    button:hover { background: #b71c1c; }
    button:disabled { background: #555; cursor: not-allowed; }
    #msg { margin-top: 25px; font-size: 16px; font-weight: bold; min-height: 24px; }
  </style>
</head>
<body>

<div class="card">
  <h2>تأكيد حذف الحساب نهائياً</h2>
  <p>مرحباً بك، لتأكيد رغبتك في حذف حسابك نهائياً من لعبة <strong>سيوف المجد</strong>، يرجى الضغط على الزر أدناه:</p>
  <button id="btn-delete" onclick="confirmDelete()">اضغط هنا لتأكيد الحذف</button>
    <p>علماً بأن هذا الإجراء لا يمكن التراجع عنه</p>
  <div id="msg"></div>
</div>

<script>
function getTokenFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('token');
}

function confirmDelete() {
  const btn = document.getElementById("btn-delete");
  const msgDiv = document.getElementById("msg");
  const token = getTokenFromUrl();

  if (!token) {
    msgDiv.style.color = "#ff5252";
    msgDiv.innerHTML = "❌ عذراً، هذا الرابط غير صالح (التوكن مفقود).";
    return;
  }

  btn.disabled = true;
  btn.innerText = "جاري التأكيد... ⏳";
  msgDiv.innerHTML = ""; 

  // رابط الـ Web App الخلفي بتاع جوجل
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMCgK_0I4v6OEMioZFSyum4Z7dCBdAZVme0e0SlN9lkDNLaIBpDzeLzEAltC2IkYqe-A/exec";

  fetch(`${GOOGLE_SCRIPT_URL}?token=${encodeURIComponent(token)}`, {
    method: "GET",
    mode: "cors"
  })
  .then(response => response.json())
  .then(result => {
    if(result.status === "ok") {
        btn.style.display = "none";
        msgDiv.style.color = "#00e676";
        msgDiv.innerHTML = "✅ تم تأكيد طلب حذف الحساب بنجاح.";
    } else if(result.status === "already") {
        btn.style.display = "none";
        msgDiv.style.color = "#ffb300";
        msgDiv.innerHTML = "⚠️ هذا الطلب تم تأكيده مسبقاً بالفعل!";
    } else {
        btn.disabled = false;
        btn.innerText = "اضغط هنا لتأكيد الحذف";
        msgDiv.style.color = "#ff5252";
        msgDiv.innerHTML = "❌ عذراً، هذا الرابط غير صالح أو منتهي.";
    }
  })
  .catch(error => {
    btn.disabled = false;
    btn.innerText = "اضغط هنا لتأكيد الحذف";
    msgDiv.style.color = "#ff5252";
    msgDiv.innerHTML = "❌ حدث خطأ في الاتصال، يرجى المحاولة مجدداً.";
  });
}
</script>
</body>
</html>
